<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF5ED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Chatulileo">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Chatulileo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    /* ===== Design tokens ===== */
    :root {
      --bg-cream: #FAF5ED;
      --card-white: #FFFFFF;
      --border-cream: #E8DDC9;
      --border-subtle: #F2EADC;
      --orange-primary: #F2A56A;
      --orange-deep: #E89564;
      --orange-soft: #D88654;

      --text-primary: #3D2E22;
      --text-muted: #8A7866;
      --text-on-orange: #FFFFFF;
      --text-on-orange-sub: #FAEAD8;

      --success-bg: #D9EDD9;
      --success-border: #B8D9B8;
      --success-text: #2E5A2E;

      --warning-bg: #FAEAD8;
      --warning-border: #E8D5B5;
      --warning-text: #8B5E2A;

      --danger-bg: #F4DCDC;
      --danger-border: #E8C0C0;
      --danger-text: #8B3A3A;

      --case-nom-bg: #F4DCDC; --case-nom-text: #8B3A3A;
      --case-akk-bg: #DCE9F4; --case-akk-text: #1F4570;
      --case-dat-bg: #D9EDD9; --case-dat-text: #2E5A2E;
      --case-gen-bg: #F4ECC0; --case-gen-text: #6B5817;

      --pill-on-orange-bg: rgba(61,46,34,0.18);
      --pill-on-white-bg: rgba(61,46,34,0.10);

      --serif: 'Playfair Display', Georgia, serif;
      --sans: Helvetica, Arial, sans-serif;

      --radius-tile: 18px;
      --radius-row: 14px;
      --radius-pill: 999px;
    }

    /* ===== Reset / base ===== */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg-cream);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.4;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
    input, textarea, select { font-family: inherit; font-size: 14px; color: var(--text-primary); }
    input:focus, textarea:focus, select:focus { outline: 2px solid var(--orange-primary); outline-offset: 1px; }

    /* ===== App shell ===== */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    .header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-cream);
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 0.5px solid transparent;
    }
    .header.scrolled { border-bottom-color: var(--border-cream); }
    .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .brand-logo { width: 32px; height: 32px; flex: none; }
    .brand-name { font-family: var(--serif); font-weight: 500; font-size: 24px; color: var(--text-primary); letter-spacing: 0.2px; }

    .lang-toggle {
      display: flex; gap: 2px;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 8px;
      padding: 3px;
    }
    .lang-pill {
      font-size: 12px; font-weight: 600;
      padding: 5px 10px;
      border-radius: 6px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
    }
    .lang-pill.active { background: var(--orange-primary); color: var(--text-primary); }

    /* ===== Main content area ===== */
    .main { flex: 1; padding: 6px 18px 100px; }

    /* ===== Tile grid (home) ===== */
    .tile-stack { display: flex; flex-direction: column; gap: 12px; }
    .tile-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .tile {
      position: relative;
      border-radius: var(--radius-tile);
      padding: 18px;
      display: flex; flex-direction: column; justify-content: flex-end;
      aspect-ratio: 1 / 1;
      transition: transform 120ms ease;
      user-select: none;
    }
    .tile:active { transform: scale(0.985); }

    .tile-big {
      background: var(--orange-deep);
      color: var(--text-on-orange);
    }
    .tile-big .tile-title { font-size: 26px; font-weight: 600; line-height: 1.15; }
    .tile-big .tile-sub { font-size: 13px; font-weight: 400; color: var(--text-on-orange-sub); margin-top: 4px; }

    .tile-small {
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      color: var(--text-primary);
    }
    .tile-small .tile-title { font-size: 17px; font-weight: 600; line-height: 1.2; }
    .tile-small .tile-sub { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 3px; }

    .count-pill {
      position: absolute; top: 14px; right: 14px;
      font-size: 12px; font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      min-width: 28px; text-align: center;
    }
    .count-pill.on-orange { background: var(--pill-on-orange-bg); color: var(--text-on-orange); }
    .count-pill.on-white { background: var(--pill-on-white-bg); color: var(--text-primary); }

    /* ===== Row tiles ===== */
    .row-tile {
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: var(--radius-row);
      padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      color: var(--text-primary);
      font-size: 14px;
      transition: transform 120ms ease;
    }
    .row-tile:active { transform: scale(0.99); }
    .row-tile .row-arrow { color: var(--text-muted); font-size: 18px; }
    .row-tile-stack { display: flex; flex-direction: column; align-items: flex-start; }
    .row-tile-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ===== Progress (collapsible) ===== */
    .progress-tile { flex-direction: column; align-items: stretch; gap: 0; }
    .progress-head { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .progress-head-stack { display: flex; flex-direction: column; align-items: flex-start; }
    .chevron { color: var(--text-muted); font-size: 14px; transition: transform 200ms ease; }
    .progress-tile.expanded .chevron { transform: rotate(180deg); }
    .progress-body {
      display: none;
      padding-top: 16px;
      margin-top: 14px;
      border-top: 0.5px solid var(--border-subtle);
    }
    .progress-tile.expanded .progress-body { display: block; }
    .progress-row {
      display: grid;
      grid-template-columns: 110px 1fr 30px;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .progress-row:last-child { margin-bottom: 0; }
    .progress-label { font-size: 12px; color: var(--text-muted); }
    .progress-bar-bg { background: var(--warning-bg); height: 8px; border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { background: var(--orange-primary); height: 100%; border-radius: 4px; transition: width 300ms ease; }
    .progress-count { font-size: 12px; font-weight: 600; color: var(--text-primary); text-align: right; }

    /* ===== Footer bar ===== */
    .footer {
      position: sticky; bottom: 0;
      background: var(--bg-cream);
      border-top: 0.5px solid var(--border-cream);
      padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
      display: flex; justify-content: center; align-items: center;
    }
    .add-btn {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-primary);
      font-size: 14px; font-weight: 600;
    }
    .add-btn-circle {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--orange-primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 600;
      line-height: 1;
    }

    /* ===== Page transitions / views ===== */
    .view { display: none; }
    .view.active { display: block; }

    /* ===== Subpage header ===== */
    .subhead {
      display: flex; align-items: center; gap: 12px;
      margin: 4px 0 18px;
    }
    .back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      font-size: 18px; color: var(--text-primary);
    }
    .subhead-title { font-size: 17px; font-weight: 600; }
    .subhead-spacer { flex: 1; }
    .subhead-meta { font-size: 12px; color: var(--text-muted); }

    /* ===== Flashcard (general practice) ===== */
    .deck-wrap { padding: 4px 0 24px; }
    .flashcard {
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 22px;
      min-height: 380px;
      padding: 28px 22px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      box-shadow: 0 1px 3px rgba(61,46,34,0.04);
      transition: transform 180ms ease;
      cursor: pointer;
      user-select: none;
    }
    .flashcard:active { transform: scale(0.995); }

    .fc-front-en { font-size: 28px; font-weight: 600; color: var(--text-primary); line-height: 1.25; }
    .fc-tap-hint { margin-top: 18px; font-size: 11px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; }

    .fc-back { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .fc-noun-line { font-size: 30px; font-weight: 600; line-height: 1.15; }
    .fc-noun-article { color: var(--text-muted); font-weight: 400; margin-right: 6px; }
    .fc-plural { font-size: 13px; color: var(--text-muted); }
    .fc-en-trans { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .fc-verb-line { font-size: 26px; font-weight: 600; line-height: 1.15; }
    .fc-meta { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 4px; }
    .meta-pill {
      background: var(--border-subtle);
      color: #5F4A36;
      font-size: 11px; font-weight: 600;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.3px;
    }
    .fc-prep-list { width: 100%; margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .fc-prep-row { font-size: 13px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .prep-word { color: var(--orange-soft); font-weight: 600; }
    .case-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.3px;
    }
    .case-badge.akk { background: var(--case-akk-bg); color: var(--case-akk-text); }
    .case-badge.dat { background: var(--case-dat-bg); color: var(--case-dat-text); }
    .case-badge.nom { background: var(--case-nom-bg); color: var(--case-nom-text); }
    .case-badge.gen { background: var(--case-gen-bg); color: var(--case-gen-text); }
    .prep-meaning { color: var(--text-muted); font-size: 12px; }

    .fc-conj {
      width: 100%;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      margin-top: 8px;
      max-width: 320px;
    }
    .conj-cell { display: flex; gap: 6px; font-size: 13px; }
    .conj-pron { color: var(--text-muted); min-width: 64px; }
    .conj-form { color: var(--text-primary); font-weight: 500; }

    .fc-perfekt-line { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .fc-perfekt-line strong { color: var(--text-primary); font-weight: 500; margin-left: 4px; }

    .fc-example {
      background: var(--bg-cream);
      border-radius: 12px;
      padding: 12px 14px;
      width: 100%;
      margin-top: 14px;
      text-align: left;
    }
    .fc-example-de { font-size: 13px; line-height: 1.45; }
    .fc-example-en { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }

    /* Case-coloring spans (used inside example sentences) */
    .case-pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 5px;
      font-weight: 500;
    }
    .case-pill.akk { background: var(--case-akk-bg); color: var(--case-akk-text); }
    .case-pill.dat { background: var(--case-dat-bg); color: var(--case-dat-text); }
    .case-pill.nom { background: var(--case-nom-bg); color: var(--case-nom-text); }
    .case-pill.gen { background: var(--case-gen-bg); color: var(--case-gen-text); }
    .prep-color { color: var(--orange-soft); font-weight: 600; }

    /* ===== Action buttons (after reveal) ===== */
    .action-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .action-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px; font-weight: 600;
      border: 0.5px solid;
      transition: transform 120ms ease, opacity 120ms ease;
    }
    .action-btn:active { transform: scale(0.99); opacity: 0.9; }
    .action-btn.success { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .action-btn.warning { background: var(--warning-bg); border-color: var(--warning-border); color: var(--warning-text); }
    .action-btn.danger { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }

    /* ===== Empty deck state ===== */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-emoji { font-size: 36px; display: block; margin-bottom: 10px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; line-height: 1.5; max-width: 280px; margin: 0 auto; }

    /* ===== Artikel deck (der/die/das) ===== */
    .artikel-prompt {
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 22px;
      padding: 32px 22px;
      display: flex; flex-direction: column; align-items: center;
      min-height: 220px; justify-content: center;
      text-align: center;
    }
    .artikel-blank { font-size: 30px; font-weight: 600; }
    .artikel-blank .blank { color: var(--text-muted); border-bottom: 2px dashed var(--border-cream); padding: 0 18px; margin-right: 6px; }
    .artikel-en { font-size: 13px; color: var(--text-muted); margin-top: 14px; }

    .artikel-choices { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 18px; }
    .artikel-choice {
      padding: 18px 0;
      border-radius: 14px;
      font-size: 16px; font-weight: 600;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      color: var(--text-primary);
    }
    .artikel-choice.correct { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .artikel-choice.wrong { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
    .artikel-choice:disabled { cursor: default; opacity: 0.95; }

    .artikel-reveal {
      margin-top: 18px;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 14px;
      padding: 14px;
    }
    .artikel-reveal-noun { font-size: 18px; font-weight: 600; }
    .artikel-reveal-plural { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .artikel-reveal-example { font-size: 13px; margin-top: 10px; line-height: 1.45; }
    .artikel-reveal-example-en { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    .next-btn {
      width: 100%; padding: 14px;
      background: var(--orange-primary); color: white;
      border-radius: 14px;
      font-size: 14px; font-weight: 600;
      margin-top: 14px;
    }

    /* ===== Verb deck (drill) ===== */
    .drill-card {
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 22px;
      padding: 24px 22px;
      min-height: 280px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .drill-step-label { font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-muted); text-align: center; }
    .drill-verb { font-size: 22px; font-weight: 600; text-align: center; }
    .drill-conj-list { display: flex; flex-direction: column; gap: 10px; }
    .drill-conj-row { display: grid; grid-template-columns: 80px 1fr; gap: 10px; align-items: center; }
    .drill-conj-pron { color: var(--text-muted); font-size: 14px; }
    .drill-input {
      padding: 11px 12px;
      border: 0.5px solid var(--border-cream);
      border-radius: 10px;
      background: var(--card-white);
      width: 100%;
    }
    .drill-input.correct { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .drill-input.wrong { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
    .drill-correct-answer { font-size: 12px; color: var(--text-muted); margin-top: 4px; padding-left: 90px; }
    .drill-correct-answer strong { color: var(--success-text); font-weight: 600; }

    .prep-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .prep-option {
      padding: 12px 0;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      transition: background 120ms ease;
    }
    .prep-option.selected { background: var(--orange-primary); color: white; border-color: var(--orange-primary); }
    .prep-option.correct-required { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
    .prep-option.wrong-selected { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); }

    .case-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .case-btn {
      padding: 16px 0;
      border-radius: 14px;
      font-size: 15px; font-weight: 600;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      color: var(--text-primary);
    }
    .case-btn.correct { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
    .case-btn.wrong { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-border); }

    .drill-question { font-size: 14px; text-align: center; color: var(--text-primary); }

    /* ===== Browse list ===== */
    .filter-chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .filter-chips::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex: none;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .filter-chip.active { background: var(--orange-primary); color: var(--text-primary); border-color: var(--orange-primary); }

    .browse-list { display: flex; flex-direction: column; gap: 6px; }
    .browse-row {
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .browse-row-main { flex: 1; min-width: 0; }
    .browse-row-de { font-size: 14px; font-weight: 500; }
    .browse-row-de .article-muted { color: var(--text-muted); font-weight: 400; margin-right: 4px; }
    .browse-row-en { font-size: 12px; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .browse-row-meta { display: flex; gap: 4px; align-items: center; flex: none; }
    .meta-tag {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--border-subtle); color: #5F4A36;
    }
    .meta-tag.box1 { background: var(--success-bg); color: var(--success-text); }
    .meta-tag.box2 { background: var(--success-bg); color: var(--success-text); }
    .meta-tag.box3 { background: var(--warning-bg); color: var(--warning-text); }
    .meta-tag.box4 { background: var(--warning-bg); color: var(--warning-text); }
    .meta-tag.box5 { background: var(--danger-bg); color: var(--danger-text); }
    .meta-tag.deck-a, .meta-tag.deck-v { background: var(--orange-primary); color: white; }
    .delete-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--danger-bg); color: var(--danger-text);
      font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .more-indicator { text-align: center; color: var(--text-muted); font-size: 12px; padding: 14px; }

    /* ===== Add form ===== */
    .add-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; background: var(--card-white); border: 0.5px solid var(--border-cream); padding: 4px; border-radius: 12px; }
    .add-tab { padding: 10px; border-radius: 9px; font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .add-tab.active { background: var(--orange-primary); color: var(--text-primary); }
    .form-stack { display: flex; flex-direction: column; gap: 12px; }
    .field-label { font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; display: block; }
    .field { display: flex; flex-direction: column; }
    .input, .select, .textarea {
      width: 100%;
      padding: 11px 12px;
      border: 0.5px solid var(--border-cream);
      border-radius: 10px;
      background: var(--card-white);
    }
    .textarea { min-height: 80px; resize: vertical; font-family: inherit; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .conj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .checkbox-row { display: flex; gap: 14px; flex-wrap: wrap; }
    .checkbox-row label { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .auto-fill-btn {
      padding: 10px 14px;
      background: var(--bg-cream);
      border: 0.5px solid var(--border-cream);
      border-radius: 10px;
      font-size: 12px; font-weight: 600;
      color: var(--text-primary);
      align-self: flex-start;
    }
    .save-btn {
      padding: 14px;
      background: var(--orange-primary);
      color: white;
      font-weight: 600; font-size: 14px;
      border-radius: 12px;
      margin-top: 6px;
    }
    .form-section-divider {
      border-top: 0.5px solid var(--border-cream);
      margin: 8px 0;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--text-primary); color: white;
      padding: 10px 16px; border-radius: var(--radius-pill);
      font-size: 13px; font-weight: 500;
      z-index: 100;
      opacity: 0;
      transition: opacity 200ms ease, transform 200ms ease;
      pointer-events: none;
      max-width: 80%;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(-4px); }

    /* ===== v2: Hit me block (shown when general practice is empty) ===== */
    .hitme {
      margin-top: 18px;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: var(--radius-row);
      padding: 18px;
    }
    .hitme-title { font-size: 14px; font-weight: 600; }
    .hitme-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .hitme-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; }
    .hitme-btn {
      padding: 14px 0;
      border-radius: 12px;
      background: var(--orange-primary);
      color: white;
      font-weight: 600; font-size: 15px;
    }
    .hitme-btn:active { transform: scale(0.98); }

    /* ===== v2: Browse multi-select ===== */
    .browse-toolbar {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 10px;
    }
    .browse-toolbar .toolbar-btn {
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      font-size: 12px; font-weight: 600;
      color: var(--text-primary);
    }
    .browse-toolbar .toolbar-btn.active { background: var(--orange-primary); color: var(--text-primary); border-color: var(--orange-primary); }
    .browse-toolbar .toolbar-meta { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    .browse-row.selectable { cursor: pointer; }
    .browse-row.selected { background: var(--warning-bg); border-color: var(--warning-border); }
    .select-checkbox {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-cream);
      display: flex; align-items: center; justify-content: center;
      flex: none;
      font-size: 14px;
      color: white;
      background: var(--card-white);
      transition: all 120ms ease;
    }
    .browse-row.selected .select-checkbox { background: var(--orange-primary); border-color: var(--orange-primary); }

    .selection-bar {
      position: sticky; bottom: 0;
      margin-top: 14px;
      background: var(--card-white);
      border: 0.5px solid var(--border-cream);
      border-radius: 14px;
      padding: 12px;
      display: flex; gap: 10px; align-items: center;
      box-shadow: 0 -4px 16px rgba(61,46,34,0.06);
    }
    .selection-bar .sel-count { font-size: 13px; color: var(--text-muted); flex: 1; }
    .selection-bar .sel-action {
      padding: 10px 16px;
      background: var(--orange-primary);
      color: white;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
    }
    .selection-bar .sel-action:disabled { opacity: 0.4; }

    /* ===== v2: Bulk import ===== */
    .add-tabs.three-tabs { grid-template-columns: 1fr 1fr 1fr; }
    .bulk-help { font-size: 12px; color: var(--text-muted); line-height: 1.45; }
    .bulk-textarea {
      width: 100%;
      min-height: 240px;
      padding: 12px;
      border: 0.5px solid var(--border-cream);
      border-radius: 10px;
      background: var(--card-white);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      resize: vertical;
    }
    .schema-block {
      background: var(--bg-cream);
      border: 0.5px solid var(--border-subtle);
      border-radius: 10px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-primary);
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .bulk-feedback {
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
    }
    .bulk-feedback.error { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-border); }
    .bulk-feedback.success { background: var(--success-bg); color: var(--success-text); border: 0.5px solid var(--success-border); }
    .bulk-feedback.warn { background: var(--warning-bg); color: var(--warning-text); border: 0.5px solid var(--warning-border); }
    .bulk-feedback ul { margin: 6px 0 0; padding-left: 18px; }
    .schema-toggle-btn {
      background: none;
      color: var(--orange-soft);
      font-size: 12px; font-weight: 600;
      padding: 4px 0;
      align-self: flex-start;
    }

    /* ===========================================================================
     * STORAGE
     * ===========================================================================*/
    const KEY_CARDS = 'chatulileo_cards_v1';
    const KEY_LEITNER = 'chatulileo_leitner_v1';
    const KEY_ARTIKEL = 'chatulileo_artikel_v1';
    const KEY_VERB = 'chatulileo_verb_v1';
    const KEY_TODAY = 'chatulileo_today_v1';
    const KEY_LANG = 'chatulileo_lang_v1';

    function load(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) { return fallback; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
    }

    /* ===========================================================================
     * STATE
     * ===========================================================================*/
    const state = {
      lang: load(KEY_LANG, 'de'),
      userCards: load(KEY_CARDS, []),
      leitner: load(KEY_LEITNER, {}),    // { cardId: {box: 1-5, dueDate: 'YYYY-MM-DD'} }
      artikel: load(KEY_ARTIKEL, {}),    // { cardId: {box: 1-3, correctCount: 0, dueDate} }
      verbdeck: load(KEY_VERB, {}),      // { cardId: {box, correctCount, dueDate, weaknessProfile: []} }
      today: load(KEY_TODAY, { date: '', l1Count: 0, introduced: [], forcedIds: [], topUpIds: [] }),
      browseSelectMode: false,
      browseSelected: new Set(),
      currentView: 'home',
      practiceQueue: [],
      practiceIdx: 0,
      practiceCardFlipped: false,
      artikelQueue: [],
      artikelIdx: 0,
      verbQueue: [],
      verbIdx: 0,
      verbStep: null,
      verbStepData: null,
      addTab: 'noun',
      browseFilter: 'all',
      progressExpanded: false,
    };

    /* ===========================================================================
     * UTILITIES
     * ===========================================================================*/
    function t(key) { return STRINGS[state.lang][key] || key; }

    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function addDays(dateStr, n) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + n);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function isDue(dateStr) {
      return dateStr <= todayStr();
    }

    const LEITNER_INTERVALS = [1, 1, 2, 4, 8, 16]; // index by box (1-5); 0 unused
    const MINI_INTERVALS = [1, 1, 3, 7]; // for artikel/verb decks (1-3)
    const L1_DAILY_CAP = 50;

    function getAllCards() {
      // Merge seed + user-added; user can't overwrite seed ids
      const seedById = {};
      (window.SEED_CARDS || []).forEach(c => { seedById[c.id] = c; });
      const merged = [...(window.SEED_CARDS || [])];
      state.userCards.forEach(uc => {
        if (!seedById[uc.id]) merged.push(uc);
      });
      return merged;
    }

    function getCardById(id) {
      return getAllCards().find(c => c.id === id);
    }

    function ensureTodayFresh() {
      const today = todayStr();
      if (state.today.date !== today) {
        state.today = { date: today, l1Count: 0, introduced: [], forcedIds: [], topUpIds: [] };
        save(KEY_TODAY, state.today);
      }
      // Backfill if loaded from older v1 storage
      if (!state.today.forcedIds) state.today.forcedIds = [];
      if (!state.today.topUpIds) state.today.topUpIds = [];
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove('visible'), 2000);
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    /* ===========================================================================
     * CASE-COLORING PARSER
     *   Markup: [prep|case]phrase[/]
     *   prep can be a real preposition word (e.g. "bei") or the literal "verb"
     *     for verb-forced cases. case is one of nom/akk/dat/gen.
     * ===========================================================================*/
    function renderExample(de) {
      // Tokenize. Pattern: [WORD|CASE]PHRASE[/]
      const re = /\[([^|\]]+)\|(nom|akk|dat|gen)\]([^\[]+)\[\/\]/gi;
      let result = '';
      let last = 0;
      let m;
      while ((m = re.exec(de)) !== null) {
        result += escHtml(de.slice(last, m.index));
        const prep = m[1];
        const cs = m[2].toLowerCase();
        const phrase = m[3];
        if (prep.toLowerCase() === 'verb') {
          // verb-forced case: just color the phrase, no prep prefix
          result += `<span class="case-pill ${cs}">${escHtml(phrase)}</span>`;
        } else {
          // preposition + colored phrase
          result += `<span class="prep-color">${escHtml(prep)}</span> <span class="case-pill ${cs}">${escHtml(phrase)}</span>`;
        }
        last = re.lastIndex;
      }
      result += escHtml(de.slice(last));
      return result;
    }

    /* ===========================================================================
     * QUEUE BUILDERS
     * ===========================================================================*/
    function buildGeneralQueue() {
      ensureTodayFresh();
      const allCards = getAllCards();
      const byId = {};
      allCards.forEach(c => { byId[c.id] = c; });

      const due = [];
      const newCandidates = [];

      allCards.forEach(card => {
        const entry = state.leitner[card.id];
        if (!entry) {
          newCandidates.push(card);
        } else if (isDue(entry.dueDate)) {
          due.push({ card, entry });
        }
      });

      // Forced cards (user pushed them in via Alle Karten "Add to today's queue").
      // These bypass the L1 daily cap and always appear at the top.
      const forcedSeen = new Set();
      const forced = [];
      state.today.forcedIds.forEach(id => {
        if (byId[id] && !forcedSeen.has(id)) {
          forced.push(byId[id]);
          forcedSeen.add(id);
        }
      });

      // Don't double-show forced cards in other buckets
      const filterForced = (arr) => arr.filter(c => !forcedSeen.has(c.id));

      // 1. L1 portion: existing L1-due first, then NEW cards (shuffled!) to fill cap
      const l1Due = filterForced(due.filter(x => x.entry.box === 1).map(x => x.card));
      const otherDue = filterForced(due.filter(x => x.entry.box !== 1).map(x => x.card));

      const slotsLeft = Math.max(0, L1_DAILY_CAP - state.today.l1Count);
      const l1Today = [];
      for (const c of l1Due) {
        if (l1Today.length >= slotsLeft) break;
        l1Today.push(c);
      }

      // SHUFFLE new candidates BEFORE slicing — fixes the "all nouns" bug.
      // Without this, seed order (90 nouns then 55 verbs) means day-one users see
      // only nouns until slot 50.
      const remainingSlots = slotsLeft - l1Today.length;
      const shuffledNew = shuffle(filterForced(newCandidates).filter(c => !state.today.introduced.includes(c.id)));
      const newToIntroduce = shuffledNew.slice(0, remainingSlots);

      // 2. Top-up cards (from "Hit me" — bypass cap, treated as a bonus mix).
      // Skip any already accounted for above.
      const accountedFor = new Set([
        ...forced.map(c => c.id),
        ...l1Today.map(c => c.id),
        ...newToIntroduce.map(c => c.id),
        ...otherDue.map(c => c.id),
      ]);
      const topUp = state.today.topUpIds
        .map(id => byId[id])
        .filter(c => c && !accountedFor.has(c.id));

      // Final order: forced first (intentional), then a shuffled mix of everything else.
      const mixed = shuffle([...l1Today, ...newToIntroduce, ...otherDue, ...topUp]);
      return [...forced, ...mixed];
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function countDueGeneral() {
      ensureTodayFresh();
      return buildGeneralQueue().length;
    }

    function countDueArtikel() {
      ensureTodayFresh();
      return Object.values(state.artikel).filter(e => isDue(e.dueDate)).length;
    }

    function countDueVerb() {
      ensureTodayFresh();
      return Object.values(state.verbdeck).filter(e => isDue(e.dueDate)).length;
    }

    /* ===========================================================================
     * FORCED CARDS + TOP-UP HELPERS
     * ===========================================================================*/
    function addForcedToToday(ids) {
      ensureTodayFresh();
      const set = new Set(state.today.forcedIds);
      ids.forEach(id => set.add(id));
      state.today.forcedIds = [...set];
      save(KEY_TODAY, state.today);
    }

    function addTopUpToToday(n) {
      ensureTodayFresh();
      const allCards = getAllCards();
      const byId = {};
      allCards.forEach(c => { byId[c.id] = c; });

      // Cards already accounted for in today's general queue — exclude them.
      const inQueue = new Set(buildGeneralQueue().map(c => c.id));

      // Pool of new candidates (never seen) + cards due in the future (already in system).
      const newPool = allCards.filter(c => !state.leitner[c.id] && !inQueue.has(c.id));
      const futurePool = allCards.filter(c => state.leitner[c.id] && !isDue(state.leitner[c.id].dueDate) && !inQueue.has(c.id));

      // Mix both pools — interleave a fair share of each.
      const shuffledNew = shuffle(newPool);
      const shuffledFuture = shuffle(futurePool);
      const picked = [];
      let i = 0, j = 0;
      while (picked.length < n && (i < shuffledNew.length || j < shuffledFuture.length)) {
        // Alternate pulling from the two pools (new first, then future, repeat)
        if (i < shuffledNew.length) { picked.push(shuffledNew[i++]); if (picked.length >= n) break; }
        if (j < shuffledFuture.length) { picked.push(shuffledFuture[j++]); }
      }
      const ids = picked.map(c => c.id);
      const set = new Set(state.today.topUpIds);
      ids.forEach(id => set.add(id));
      state.today.topUpIds = [...set];
      save(KEY_TODAY, state.today);
      return ids.length;
    }

    /* ===========================================================================
     * BULK IMPORT VALIDATION
     * ===========================================================================*/
    function validateBulkCards(rawText) {
      // Returns { ok: bool, cards?: [...], error?: string, warnings?: [...] }
      let parsed;
      try {
        parsed = JSON.parse(rawText);
      } catch (e) {
        return { ok: false, error: 'JSON-Fehler: ' + e.message };
      }
      if (!Array.isArray(parsed)) return { ok: false, error: 'Erwartet ein Array von Karten.' };
      const out = [];
      const warnings = [];
      const seenIds = new Set(getAllCards().map(c => c.id));
      const localIds = new Set();

      for (let i = 0; i < parsed.length; i++) {
        const c = parsed[i];
        const where = `Karte #${i + 1}`;
        if (!c || typeof c !== 'object') return { ok: false, error: `${where}: kein Objekt.` };
        if (c.type !== 'noun' && c.type !== 'verb') return { ok: false, error: `${where}: type muss 'noun' oder 'verb' sein.` };
        if (!Array.isArray(c.en) || c.en.length === 0) return { ok: false, error: `${where}: en muss ein nicht-leeres Array sein.` };
        if (c.type === 'noun') {
          if (!['der','die','das'].includes(c.article)) return { ok: false, error: `${where}: article muss der/die/das sein.` };
          if (!c.word) return { ok: false, error: `${where}: word fehlt.` };
        } else {
          if (!c.infinitive) return { ok: false, error: `${where}: infinitive fehlt.` };
          if (!c.conj || typeof c.conj !== 'object') return { ok: false, error: `${where}: conj fehlt.` };
          for (const p of ['ich','du','er','wir','ihr','sie']) {
            if (!c.conj[p]) return { ok: false, error: `${where}: conj.${p} fehlt.` };
          }
          if (!c.perfekt) return { ok: false, error: `${where}: perfekt fehlt.` };
          if (!c.praeteritum) return { ok: false, error: `${where}: praeteritum fehlt.` };
        }
        // ID handling: assign one if missing, complain if it collides
        let id = c.id;
        if (!id) {
          id = 'u' + Date.now() + '_' + i;
        }
        if (seenIds.has(id) || localIds.has(id)) {
          warnings.push(`${where}: id '${id}' existiert schon — übersprungen.`);
          continue;
        }
        localIds.add(id);

        // Normalize the card with sane defaults
        const card = {
          id,
          type: c.type,
          en: c.en.slice(0, 3),
          example: c.example && c.example.de ? { de: String(c.example.de), en: String(c.example.en || '') } : { de: '', en: '' },
          level: c.level || 'custom',
        };
        if (c.type === 'noun') {
          card.article = c.article;
          card.word = c.word;
          card.plural = c.plural || '—';
        } else {
          card.infinitive = c.infinitive;
          card.conj = { ich: c.conj.ich, du: c.conj.du, er: c.conj.er, wir: c.conj.wir, ihr: c.conj.ihr, sie: c.conj.sie };
          card.perfekt = c.perfekt;
          card.praeteritum = c.praeteritum;
          card.hilfsverb = c.hilfsverb || 'haben';
          card.reflexive = !!c.reflexive;
          card.separable = !!c.separable;
          card.strong = !!c.strong;
          card.objectCase = c.objectCase || null;
          card.prepositions = Array.isArray(c.prepositions) ? c.prepositions
            .filter(p => p && p.prep && (p.case === 'Akk' || p.case === 'Dat'))
            .map(p => ({ prep: p.prep, case: p.case, meaning: p.meaning || '' })) : [];
        }
        out.push(card);
      }
      return { ok: true, cards: out, warnings };
    }

    /* ===========================================================================
     * GRADING — General Leitner
     * ===========================================================================*/
    function gradeGeneral(cardId, action) {
      // action: 'knew' | 'detail_wrong' | 'didnt_know'
      const today = todayStr();
      let entry = state.leitner[cardId];
      const isNew = !entry;

      if (isNew) {
        // First time touching this card
        entry = { box: 1, dueDate: today };
        state.today.introduced.push(cardId);
        state.today.l1Count += 1;
      }

      if (action === 'knew') {
        entry.box = Math.min(5, entry.box + 1);
      } else if (action === 'detail_wrong') {
        // Stays in current box for general purposes; specialized deck gets the card
        const card = getCardById(cardId);
        if (card.type === 'noun') {
          // Add to artikel deck if not already there
          if (!state.artikel[cardId]) {
            state.artikel[cardId] = { box: 1, correctCount: 0, dueDate: today };
          }
        } else {
          // Verb: add to verb deck with FULL weakness profile
          if (!state.verbdeck[cardId]) {
            state.verbdeck[cardId] = {
              box: 1,
              correctCount: 0,
              dueDate: today,
              weaknessProfile: buildFullWeaknessProfile(card),
            };
          }
        }
      } else if (action === 'didnt_know') {
        entry.box = 1;
        if (!isNew) {
          // Count as an L1 use today
          state.today.l1Count += 1;
        }
      }

      entry.dueDate = addDays(today, LEITNER_INTERVALS[entry.box]);
      state.leitner[cardId] = entry;
      save(KEY_LEITNER, state.leitner);
      save(KEY_ARTIKEL, state.artikel);
      save(KEY_VERB, state.verbdeck);
      save(KEY_TODAY, state.today);
    }

    function buildFullWeaknessProfile(card) {
      const items = [];
      ['ich','du','er','wir','ihr','sie'].forEach(p => items.push({ kind: 'conj', pronoun: p }));
      items.push({ kind: 'perfekt' });
      items.push({ kind: 'praeteritum' });
      if (card.prepositions && card.prepositions.length > 0) {
        items.push({ kind: 'prepositions' });
        card.prepositions.forEach((p, i) => items.push({ kind: 'prep_case', idx: i }));
      }
      if (card.objectCase) items.push({ kind: 'object_case' });
      return items;
    }

    /* ===========================================================================
     * GRADING — Mini decks (artikel & verb)
     * ===========================================================================*/
    function gradeArtikel(cardId, correct) {
      const today = todayStr();
      const entry = state.artikel[cardId] || { box: 1, correctCount: 0, dueDate: today };
      if (correct) {
        if (entry.box < 3) {
          entry.box += 1;
          entry.correctCount = 0;
        } else {
          entry.correctCount += 1;
        }
        if (entry.box === 3 && entry.correctCount >= 3) {
          // Graduate — remove from deck
          delete state.artikel[cardId];
          save(KEY_ARTIKEL, state.artikel);
          showToast(t('graduated'));
          return;
        }
      } else {
        entry.box = 1;
        entry.correctCount = 0;
      }
      entry.dueDate = addDays(today, MINI_INTERVALS[entry.box]);
      state.artikel[cardId] = entry;
      save(KEY_ARTIKEL, state.artikel);
    }

    function gradeVerbDrill(cardId, allCorrect) {
      const today = todayStr();
      const entry = state.verbdeck[cardId];
      if (!entry) return;
      if (allCorrect) {
        if (entry.box < 3) {
          entry.box += 1;
          entry.correctCount = 0;
        } else {
          entry.correctCount += 1;
        }
        if (entry.box === 3 && entry.correctCount >= 3) {
          delete state.verbdeck[cardId];
          save(KEY_VERB, state.verbdeck);
          showToast(t('graduated'));
          return;
        }
      }
      // Partial OR full correct: the next due date based on the (possibly) new box
      entry.dueDate = addDays(today, MINI_INTERVALS[entry.box]);
      state.verbdeck[cardId] = entry;
      save(KEY_VERB, state.verbdeck);
    }

    /* ===========================================================================
     * STRICT MATCHING (with case-insensitive + umlaut alternatives only)
     * ===========================================================================*/
    function normalizeAnswer(s) {
      return String(s || '').trim().toLowerCase()
        .replace(/ae/g, 'ä').replace(/oe/g, 'ö').replace(/ue/g, 'ü').replace(/ss/g, 'ß');
    }
    function matchesAnswer(input, expected) {
      return normalizeAnswer(input) === normalizeAnswer(expected);
    }
