      view.innerHTML = `
        <div class="subhead">
          <button class="back-btn" id="art-back">←</button>
          <div class="subhead-title">${t('practice_artikel')}</div>
          <div class="subhead-spacer"></div>
          <div class="subhead-meta">${state.artikelIdx + 1} / ${queue.length}</div>
        </div>
        <div class="artikel-prompt">
          <div class="artikel-blank"><span class="blank">___</span>${escHtml(card.word)}</div>
          <div class="artikel-en">${escHtml(card.en.join(', '))}</div>
        </div>
        <div class="artikel-choices">
          ${['der','die','das'].map(a => {
            let cls = '';
            if (choice) {
              if (a === correct) cls = 'correct';
              else if (a === choice && choice !== correct) cls = 'wrong';
            }
            return `<button class="artikel-choice ${cls}" data-art="${a}" ${choice ? 'disabled' : ''}>${a}</button>`;
          }).join('')}
        </div>
        ${choice ? `
          <div class="artikel-reveal">
            <div class="artikel-reveal-noun">${escHtml(card.article)} ${escHtml(card.word)}</div>
            <div class="artikel-reveal-plural">${t('plural')}: ${escHtml(card.plural)}</div>
            ${card.example ? `
              <div class="artikel-reveal-example">${renderExample(card.example.de)}</div>
              <div class="artikel-reveal-example-en">${escHtml(card.example.en)}</div>` : ''}
          </div>
          <button class="next-btn" id="art-next">${t('next')}</button>` : ''}
      `;

      document.getElementById('art-back').onclick = goHome;
      view.querySelectorAll('.artikel-choice').forEach(btn => {
        btn.onclick = () => {
          if (state.artikelChoice) return;
          state.artikelChoice = btn.dataset.art;
          gradeArtikel(card.id, state.artikelChoice === correct);
          renderArtikel();
        };
      });
      const nextBtn = document.getElementById('art-next');
      if (nextBtn) nextBtn.onclick = () => {
        state.artikelIdx += 1;
        state.artikelChoice = null;
        renderArtikel();
      };
    }

    /* ===========================================================================
     * RENDER — VERB DRILL DECK
     * ===========================================================================*/
    function startVerbPractice() {
      ensureTodayFresh();
      const dueIds = Object.entries(state.verbdeck)
        .filter(([_, e]) => isDue(e.dueDate))
        .map(([id]) => id);
      state.verbQueue = shuffle(dueIds);
      state.verbIdx = 0;
      state.verbStep = null;
      renderVerbDeck();
      showView('verbdeck');
    }

    function renderVerbDeck() {
      const view = document.getElementById('view-verbdeck');
      const queue = state.verbQueue;

      if (queue.length === 0 || state.verbIdx >= queue.length) {
        view.innerHTML = `
          <div class="subhead">
            <button class="back-btn" id="vd-back">←</button>
            <div class="subhead-title">${t('practice_verb')}</div>
          </div>
          <div class="empty">
            <span class="empty-emoji">📭</span>
            <div class="empty-title">${queue.length === 0 ? t('nothing_in_verb') : t('nothing_due')}</div>
            <div class="empty-sub">${queue.length === 0 ? t('nothing_in_verb_sub') : t('nothing_due_sub')}</div>
          </div>`;
        document.getElementById('vd-back').onclick = goHome;
        return;
      }

      const cardId = queue[state.verbIdx];
      const card = getCardById(cardId);
      const entry = state.verbdeck[cardId];
      if (!card || card.type !== 'verb' || !entry) {
        state.verbIdx += 1; renderVerbDeck(); return;
      }

      // Initialize step session if needed
      if (!state.verbStep) {
        state.verbStep = { phase: pickFirstPhase(entry.weaknessProfile), results: {}, drillCorrected: [] };
        state.verbStepData = null;
      }
      const phase = state.verbStep.phase;
      if (!phase) {
        // No items to drill — finalize as all correct
        finalizeVerbDrill(card, entry, true);
        return;
      }

      const totalCount = queue.length;
      const subhead = `
        <div class="subhead">
          <button class="back-btn" id="vd-back">←</button>
          <div class="subhead-title">${t('practice_verb')}</div>
          <div class="subhead-spacer"></div>
          <div class="subhead-meta">${state.verbIdx + 1} / ${totalCount}</div>
        </div>`;

      if (phase === 'conj') {
        renderVerbConjStep(view, subhead, card, entry);
      } else if (phase === 'perfekt') {
        renderVerbSimpleTextStep(view, subhead, card, entry, 'perfekt', t('perfekt'), card.perfekt);
      } else if (phase === 'praeteritum') {
        renderVerbSimpleTextStep(view, subhead, card, entry, 'praeteritum', t('praeteritum'), card.praeteritum);
      } else if (phase === 'prepositions') {
        renderVerbPrepStep(view, subhead, card, entry);
      } else if (phase === 'prep_case') {
        renderVerbPrepCaseStep(view, subhead, card, entry);
      } else if (phase === 'object_case') {
        renderVerbObjectCaseStep(view, subhead, card, entry);
      } else if (phase === 'done') {
        finalizeVerbDrillFromResults(card, entry);
      }

      const back = document.getElementById('vd-back');
      if (back) back.onclick = goHome;
    }

    function pickFirstPhase(profile) {
      if (profile.some(i => i.kind === 'conj')) return 'conj';
      if (profile.some(i => i.kind === 'perfekt')) return 'perfekt';
      if (profile.some(i => i.kind === 'praeteritum')) return 'praeteritum';
      if (profile.some(i => i.kind === 'prepositions')) return 'prepositions';
      if (profile.some(i => i.kind === 'prep_case')) return 'prep_case';
      if (profile.some(i => i.kind === 'object_case')) return 'object_case';
      return null;
    }

    function nextPhase(card, entry, currentPhase) {
      // Walk through phases in order; skip ones with no remaining items
      const order = ['conj','perfekt','praeteritum','prepositions','prep_case','object_case'];
      const startIdx = order.indexOf(currentPhase) + 1;
      for (let i = startIdx; i < order.length; i++) {
        const p = order[i];
        if (entry.weaknessProfile.some(item => item.kind === p)) {
          return p;
        }
      }
      return 'done';
    }

    function renderVerbConjStep(view, subhead, card, entry) {
      const items = entry.weaknessProfile.filter(i => i.kind === 'conj');
      const submitted = state.verbStepData && state.verbStepData.submitted;
      const inputs = state.verbStepData && state.verbStepData.inputs ? state.verbStepData.inputs : {};
      const pronLabel = { ich: 'ich', du: 'du', er: 'er/sie/es', wir: 'wir', ihr: 'ihr', sie: 'sie/Sie' };

      const rowsHtml = items.map(it => {
        const expected = card.conj[it.pronoun];
        const userVal = inputs[it.pronoun] || '';
        let cls = '';
        let extra = '';
        if (submitted) {
          const ok = matchesAnswer(userVal, expected);
          cls = ok ? 'correct' : 'wrong';
          if (!ok) extra = `<div class="drill-correct-answer">→ <strong>${escHtml(expected)}</strong></div>`;
        }
        return `
          <div>
            <div class="drill-conj-row">
              <div class="drill-conj-pron">${pronLabel[it.pronoun]}</div>
              <input class="drill-input ${cls}" data-pron="${it.pronoun}" value="${escHtml(userVal)}" autocomplete="off" autocapitalize="off" spellcheck="false" ${submitted ? 'disabled' : ''}>
            </div>
            ${extra}
          </div>`;
      }).join('');

      view.innerHTML = `
        ${subhead}
        <div class="drill-card">
          <div class="drill-step-label">${t('conjugation')}</div>
          <div class="drill-verb">${escHtml(card.infinitive)}</div>
          <div class="drill-conj-list">${rowsHtml}</div>
          ${submitted
            ? `<button class="next-btn" id="vd-continue">${t('verb_drill_continue')}</button>`
            : `<button class="next-btn" id="vd-check">${t('check')}</button>`}
        </div>`;

      document.getElementById('vd-back').onclick = goHome;
      const inputsEls = view.querySelectorAll('.drill-input');
      function readInputs() {
        const obj = {};
        inputsEls.forEach(el => { obj[el.dataset.pron] = el.value; });
        return obj;
      }
      const checkBtn = document.getElementById('vd-check');
      if (checkBtn) checkBtn.onclick = () => {
        const inputObj = readInputs();
        // Update profile: remove correct items
        const newProfile = entry.weaknessProfile.filter(it => {
          if (it.kind !== 'conj') return true;
          const ok = matchesAnswer(inputObj[it.pronoun] || '', card.conj[it.pronoun]);
          if (ok) {
            state.verbStep.drillCorrected.push({ kind: 'conj', pronoun: it.pronoun });
            return false;
          }
          return true;
        });
        entry.weaknessProfile = newProfile;
        save(KEY_VERB, state.verbdeck);
        state.verbStepData = { submitted: true, inputs: inputObj };
        renderVerbDeck();
      };
      const contBtn = document.getElementById('vd-continue');
      if (contBtn) contBtn.onclick = () => {
        state.verbStep.phase = nextPhase(card, entry, 'conj');
        state.verbStepData = null;
        renderVerbDeck();
      };
    }

    function renderVerbSimpleTextStep(view, subhead, card, entry, kind, label, expected) {
      const submitted = state.verbStepData && state.verbStepData.submitted;
      const userVal = state.verbStepData && state.verbStepData.input ? state.verbStepData.input : '';
      let cls = '', extra = '';
      if (submitted) {
        const ok = matchesAnswer(userVal, expected);
        cls = ok ? 'correct' : 'wrong';
        if (!ok) extra = `<div class="drill-correct-answer">→ <strong>${escHtml(expected)}</strong></div>`;
      }

      view.innerHTML = `
        ${subhead}
        <div class="drill-card">
          <div class="drill-step-label">${escHtml(label)}</div>
          <div class="drill-verb">${escHtml(card.infinitive)}</div>
          <div>
            <div class="drill-conj-row" style="grid-template-columns: 1fr;">
              <input class="drill-input ${cls}" id="vd-input" value="${escHtml(userVal)}" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="${kind === 'perfekt' ? 'z.B. hat gespielt' : 'z.B. spielte'}" ${submitted ? 'disabled' : ''}>
            </div>
            ${extra}
          </div>
          ${submitted
            ? `<button class="next-btn" id="vd-continue">${t('verb_drill_continue')}</button>`
            : `<button class="next-btn" id="vd-check">${t('check')}</button>`}
        </div>`;

      document.getElementById('vd-back').onclick = goHome;
      const checkBtn = document.getElementById('vd-check');
      if (checkBtn) checkBtn.onclick = () => {
        const val = document.getElementById('vd-input').value;
        const ok = matchesAnswer(val, expected);
        if (ok) {
          entry.weaknessProfile = entry.weaknessProfile.filter(it => it.kind !== kind);
          state.verbStep.drillCorrected.push({ kind });
          save(KEY_VERB, state.verbdeck);
        }
        state.verbStepData = { submitted: true, input: val };
        renderVerbDeck();
      };
      const contBtn = document.getElementById('vd-continue');
      if (contBtn) contBtn.onclick = () => {
        state.verbStep.phase = nextPhase(card, entry, kind);
        state.verbStepData = null;
        renderVerbDeck();
      };
    }

    function renderVerbPrepStep(view, subhead, card, entry) {
      const PREP_BANK = ['an','auf','bei','für','gegen','in','mit','nach','über','um','von','vor','zu'];
      const correctSet = new Set((card.prepositions || []).map(p => p.prep));
      const submitted = state.verbStepData && state.verbStepData.submitted;
      const selected = state.verbStepData && state.verbStepData.selected ? state.verbStepData.selected : new Set();

      // Build the displayed bank: union of correct preps + a fixed bank
      const displayBank = Array.from(new Set([...PREP_BANK, ...correctSet]));

      const optsHtml = displayBank.map(p => {
        let cls = selected.has(p) ? 'selected' : '';
        if (submitted) {
          const isCorrect = correctSet.has(p);
          const wasSelected = selected.has(p);
          if (isCorrect) cls = 'correct-required';
          else if (wasSelected && !isCorrect) cls = 'wrong-selected';
          else cls = '';
        }
        return `<button class="prep-option ${cls}" data-prep="${escHtml(p)}" ${submitted ? 'disabled' : ''}>${escHtml(p)}</button>`;
      }).join('');

      view.innerHTML = `
        ${subhead}
        <div class="drill-card">
          <div class="drill-step-label">${t('prepositions')}</div>
          <div class="drill-verb">${escHtml(card.infinitive)}</div>
          <div class="drill-question">${state.lang === 'de' ? 'Wähle ALLE richtigen Präpositionen.' : 'Select ALL correct prepositions.'}</div>
          <div class="prep-options">${optsHtml}</div>
          ${submitted
            ? `<button class="next-btn" id="vd-continue">${t('verb_drill_continue')}</button>`
            : `<button class="next-btn" id="vd-check">${t('check')}</button>`}
        </div>`;

      document.getElementById('vd-back').onclick = goHome;
      view.querySelectorAll('.prep-option').forEach(btn => {
        btn.onclick = () => {
          if (submitted) return;
          const sel = state.verbStepData && state.verbStepData.selected ? state.verbStepData.selected : new Set();
          const p = btn.dataset.prep;
          if (sel.has(p)) sel.delete(p); else sel.add(p);
          state.verbStepData = { selected: sel, submitted: false };
          renderVerbDeck();
        };
      });
      const checkBtn = document.getElementById('vd-check');
      if (checkBtn) checkBtn.onclick = () => {
        // Atomic: must match correctSet exactly
        const sel = (state.verbStepData && state.verbStepData.selected) || new Set();
        const exact = sel.size === correctSet.size && [...correctSet].every(p => sel.has(p));
        if (exact) {
          entry.weaknessProfile = entry.weaknessProfile.filter(it => it.kind !== 'prepositions');
          state.verbStep.drillCorrected.push({ kind: 'prepositions' });
          save(KEY_VERB, state.verbdeck);
        }
        state.verbStepData = { selected: sel, submitted: true };
        renderVerbDeck();
      };
      const contBtn = document.getElementById('vd-continue');
      if (contBtn) contBtn.onclick = () => {
        state.verbStep.phase = nextPhase(card, entry, 'prepositions');
        state.verbStepData = null;
        renderVerbDeck();
      };
    }

    function renderVerbPrepCaseStep(view, subhead, card, entry) {
      // Take the first prep_case item still in profile
      const item = entry.weaknessProfile.find(i => i.kind === 'prep_case');
      if (!item) {
        state.verbStep.phase = nextPhase(card, entry, 'prep_case');
        renderVerbDeck();
        return;
      }
      const prepObj = card.prepositions[item.idx];
      const submitted = state.verbStepData && state.verbStepData.submitted;
      const choice = state.verbStepData && state.verbStepData.choice;
      const correct = prepObj.case;

      view.innerHTML = `
        ${subhead}
        <div class="drill-card">
          <div class="drill-step-label">${t('prepositions')}</div>
          <div class="drill-verb">${escHtml(card.infinitive)}</div>
          <div class="drill-question">${t('what_case')} <strong>${escHtml(card.infinitive)}</strong> ${t('with_prep')} <span class="prep-color">${escHtml(prepObj.prep)}</span>?</div>
          <div class="case-choice">
            ${['Akk','Dat'].map(c => {
              let cls = '';
              if (submitted) {
                if (c === correct) cls = 'correct';
                else if (c === choice && choice !== correct) cls = 'wrong';
              }
              return `<button class="case-btn ${cls}" data-case="${c}" ${submitted ? 'disabled' : ''}>${c === 'Akk' ? 'Akkusativ' : 'Dativ'}</button>`;
            }).join('')}
          </div>
          ${submitted
            ? `<button class="next-btn" id="vd-continue">${t('verb_drill_continue')}</button>`
            : ''}
        </div>`;

      document.getElementById('vd-back').onclick = goHome;
      view.querySelectorAll('.case-btn').forEach(btn => {
        btn.onclick = () => {
          if (submitted) return;
          const c = btn.dataset.case;
          if (c === correct) {
            entry.weaknessProfile = entry.weaknessProfile.filter(it =>
              !(it.kind === 'prep_case' && it.idx === item.idx)
            );
            state.verbStep.drillCorrected.push({ kind: 'prep_case', idx: item.idx });
            save(KEY_VERB, state.verbdeck);
          }
          state.verbStepData = { submitted: true, choice: c };
          renderVerbDeck();
        };
      });
      const contBtn = document.getElementById('vd-continue');
      if (contBtn) contBtn.onclick = () => {
        // After this prep_case, check if more prep_case items remain
        if (entry.weaknessProfile.some(i => i.kind === 'prep_case')) {
          state.verbStepData = null;
          renderVerbDeck();
        } else {
          state.verbStep.phase = nextPhase(card, entry, 'prep_case');
          state.verbStepData = null;
          renderVerbDeck();
        }
      };
    }

    function renderVerbObjectCaseStep(view, subhead, card, entry) {
      const submitted = state.verbStepData && state.verbStepData.submitted;
      const choice = state.verbStepData && state.verbStepData.choice;
      const correct = card.objectCase;

      view.innerHTML = `
        ${subhead}
        <div class="drill-card">
          <div class="drill-step-label">${t('object_case')}</div>
          <div class="drill-verb">${escHtml(card.infinitive)}</div>
          <div class="drill-question">${state.lang === 'de' ? 'Welchen Kasus verlangt das Verb für sein Objekt?' : 'Which case does this verb take for its object?'}</div>
          <div class="case-choice">
            ${['Akk','Dat'].map(c => {
              let cls = '';
              if (submitted) {
                if (c === correct) cls = 'correct';
                else if (c === choice && choice !== correct) cls = 'wrong';
              }
              return `<button class="case-btn ${cls}" data-case="${c}" ${submitted ? 'disabled' : ''}>${c === 'Akk' ? 'Akkusativ' : 'Dativ'}</button>`;
            }).join('')}
          </div>
          ${submitted
            ? `<button class="next-btn" id="vd-continue">${t('verb_drill_continue')}</button>`
            : ''}
        </div>`;

      document.getElementById('vd-back').onclick = goHome;
      view.querySelectorAll('.case-btn').forEach(btn => {
        btn.onclick = () => {
          if (submitted) return;
          const c = btn.dataset.case;
          if (c === correct) {
            entry.weaknessProfile = entry.weaknessProfile.filter(it => it.kind !== 'object_case');
            state.verbStep.drillCorrected.push({ kind: 'object_case' });
            save(KEY_VERB, state.verbdeck);
          }
          state.verbStepData = { submitted: true, choice: c };
          renderVerbDeck();
        };
      });
      const contBtn = document.getElementById('vd-continue');
      if (contBtn) contBtn.onclick = () => {
        state.verbStep.phase = nextPhase(card, entry, 'object_case');
        state.verbStepData = null;
        renderVerbDeck();
      };
    }

    function finalizeVerbDrill(card, entry, allCorrect) {
      gradeVerbDrill(card.id, allCorrect);
      state.verbIdx += 1;
      state.verbStep = null;
      state.verbStepData = null;
      renderVerbDeck();
    }

    function finalizeVerbDrillFromResults(card, entry) {
      const allCorrect = entry.weaknessProfile.length === 0;
      // Show a tiny summary then advance
      const view = document.getElementById('view-verbdeck');
      view.innerHTML = `
        <div class="subhead">
          <button class="back-btn" id="vd-back">←</button>
          <div class="subhead-title">${t('practice_verb')}</div>
        </div>
        <div class="drill-card" style="text-align:center;justify-content:center;">
          <div class="drill-verb">${escHtml(card.infinitive)}</div>
          <div class="drill-question">${allCorrect ? t('verb_drill_done') : t('verb_drill_partial')}</div>
          <button class="next-btn" id="vd-finalize">${t('verb_drill_continue')}</button>
        </div>`;
      document.getElementById('vd-back').onclick = goHome;
      document.getElementById('vd-finalize').onclick = () => finalizeVerbDrill(card, entry, allCorrect);
    }

    /* ===========================================================================
     * RENDER — BROWSE
     * ===========================================================================*/
    function renderBrowse() {
      const all = getAllCards();
      const seedIds = new Set((window.SEED_CARDS || []).map(c => c.id));
      const filter = state.browseFilter;

      let filtered = all;
      if (filter === 'noun') filtered = filtered.filter(c => c.type === 'noun');
      else if (filter === 'verb') filtered = filtered.filter(c => c.type === 'verb');
      else if (filter === 'A1' || filter === 'A2' || filter === 'B1') filtered = filtered.filter(c => c.level === filter);
      else if (filter === 'mine') filtered = filtered.filter(c => !seedIds.has(c.id));

      const total = filtered.length;
      const shown = filtered.slice(0, 200);
      const selectMode = state.browseSelectMode;
      const sel = state.browseSelected;

      const chips = [
        { id: 'all', label: t('all') },
        { id: 'noun', label: t('nomen') },
        { id: 'verb', label: t('verben') },
        { id: 'A1', label: 'A1' }, { id: 'A2', label: 'A2' }, { id: 'B1', label: 'B1' },
        { id: 'mine', label: t('eigene') },
      ];

      const rowsHtml = shown.map(c => {
        const ent = state.leitner[c.id];
        const inArt = state.artikel[c.id];
        const inVerb = state.verbdeck[c.id];
        const isMine = !seedIds.has(c.id);
        const main = c.type === 'noun'
          ? `<span class="article-muted">${escHtml(c.article)}</span>${escHtml(c.word)}`
          : escHtml(c.infinitive);
        const en = c.en.join(', ');
        const isSelected = selectMode && sel.has(c.id);
        const checkbox = selectMode
          ? `<div class="select-checkbox">${isSelected ? '✓' : ''}</div>`
          : '';
        return `
          <div class="browse-row ${selectMode ? 'selectable' : ''} ${isSelected ? 'selected' : ''}" data-id="${escHtml(c.id)}">
            ${checkbox}
            <div class="browse-row-main">
              <div class="browse-row-de">${main}</div>
              <div class="browse-row-en">${escHtml(en)}</div>
            </div>
            <div class="browse-row-meta">
              ${ent ? `<span class="meta-tag box${ent.box}">L${ent.box}</span>` : ''}
              ${inArt ? `<span class="meta-tag deck-a">A</span>` : ''}
              ${inVerb ? `<span class="meta-tag deck-v">V</span>` : ''}
              ${isMine && !selectMode ? `<button class="delete-btn" data-del-id="${escHtml(c.id)}" title="delete">×</button>` : ''}
            </div>
          </div>`;
      }).join('');

      const view = document.getElementById('view-browse');
      view.innerHTML = `
        <div class="subhead">
          <button class="back-btn" id="br-back">←</button>
          <div class="subhead-title">${t('all_cards')}</div>
          <div class="subhead-spacer"></div>
          <div class="subhead-meta">${total}</div>
        </div>
        <div class="browse-toolbar">
          <button class="toolbar-btn ${selectMode ? 'active' : ''}" id="toggle-select">${selectMode ? t('cancel') : t('select')}</button>
        </div>
        <div class="filter-chips">
          ${chips.map(ch => `<button class="filter-chip ${state.browseFilter === ch.id ? 'active' : ''}" data-f="${ch.id}">${escHtml(ch.label)}</button>`).join('')}
        </div>
        ${shown.length === 0
          ? `<div class="empty"><div class="empty-title">${t('no_cards_match')}</div></div>`
          : `<div class="browse-list">${rowsHtml}</div>`}
        ${total > 200 ? `<div class="more-indicator">…${total - 200} ${t('more_suffix')} ${t('and_more')}</div>` : ''}
        ${selectMode ? `
          <div class="selection-bar">
            <div class="sel-count">${sel.size} ${t('n_selected')}</div>
            <button class="sel-action" id="add-to-today-btn" ${sel.size === 0 ? 'disabled' : ''}>${t('add_to_today')}</button>
          </div>` : ''}
      `;

      document.getElementById('br-back').onclick = goHome;
      view.querySelectorAll('.filter-chip').forEach(b => {
        b.onclick = () => { state.browseFilter = b.dataset.f; renderBrowse(); };
      });
      document.getElementById('toggle-select').onclick = () => {
        state.browseSelectMode = !state.browseSelectMode;
        if (!state.browseSelectMode) state.browseSelected = new Set();
        renderBrowse();
      };
      view.querySelectorAll('.delete-btn').forEach(b => {
        b.onclick = (e) => {
          e.stopPropagation();
          if (!confirm(t('confirm_delete'))) return;
          const id = b.dataset.delId;
          state.userCards = state.userCards.filter(c => c.id !== id);
          delete state.leitner[id]; delete state.artikel[id]; delete state.verbdeck[id];
          save(KEY_CARDS, state.userCards);
          save(KEY_LEITNER, state.leitner);
          save(KEY_ARTIKEL, state.artikel);
          save(KEY_VERB, state.verbdeck);
          renderBrowse();
        };
      });
      if (selectMode) {
        view.querySelectorAll('.browse-row.selectable').forEach(row => {
          row.onclick = () => {
            const id = row.dataset.id;
            if (sel.has(id)) sel.delete(id); else sel.add(id);
            renderBrowse();
          };
        });
        const addBtn = document.getElementById('add-to-today-btn');
        if (addBtn) addBtn.onclick = () => {
          if (sel.size === 0) return;
          const ids = [...sel];
          addForcedToToday(ids);
          showToast(`${ids.length} ${t('added_n_cards')}`);
          state.browseSelectMode = false;
          state.browseSelected = new Set();
          renderBrowse();
        };
      }
    }

    /* ===========================================================================
     * RENDER — ADD WORD FORM
     * ===========================================================================*/
    function renderAdd() {
      const view = document.getElementById('view-add');
      const tab = state.addTab;

      const tabBar = `
        <div class="add-tabs three-tabs">
          <button class="add-tab ${tab === 'noun' ? 'active' : ''}" data-tab="noun">${t('nomen_tab_short')}</button>
          <button class="add-tab ${tab === 'verb' ? 'active' : ''}" data-tab="verb">${t('verb_tab_short')}</button>
          <button class="add-tab ${tab === 'bulk' ? 'active' : ''}" data-tab="bulk">${t('bulk_tab')}</button>
        </div>`;

      let formHtml = '';
      if (tab === 'noun') {
        formHtml = `
          <div class="form-stack">
            <div class="field-row">
              <div class="field"><label class="field-label">${t('article_label')}</label>
                <select class="select" id="f-article"><option>der</option><option>die</option><option>das</option></select>
              </div>
              <div class="field"><label class="field-label">${t('niveau')}</label>
                <select class="select" id="f-niveau"><option>A1</option><option>A2</option><option>B1</option><option>custom</option></select>
              </div>
            </div>
            <div class="field"><label class="field-label">${t('noun_de')}</label><input class="input" id="f-noun"></div>
            <div class="field"><label class="field-label">${t('plural_label')}</label><input class="input" id="f-plural" placeholder="—"></div>
            <div class="field"><label class="field-label">${t('english_label')}</label><input class="input" id="f-en"></div>
            <div class="field"><label class="field-label">${t('example_de')}</label><input class="input" id="f-ex-de"></div>
            <div class="field"><label class="field-label">${t('example_en')}</label><input class="input" id="f-ex-en"></div>
            <button class="save-btn" id="f-save">${t('save')}</button>
          </div>`;
      } else if (tab === 'verb') {
        formHtml = `
          <div class="form-stack">
            <div class="field-row">
              <div class="field"><label class="field-label">${t('verb_inf')}</label><input class="input" id="f-inf" placeholder="spielen / sich freuen"></div>
              <div class="field"><label class="field-label">${t('niveau')}</label>
                <select class="select" id="f-niveau"><option>A1</option><option>A2</option><option>B1</option><option>custom</option></select>
              </div>
            </div>
            <div class="field"><label class="field-label">${t('english_label')}</label><input class="input" id="f-en"></div>
            <button type="button" class="auto-fill-btn" id="f-autofill">${t('autofill')}</button>
            <div class="form-section-divider"></div>
            <label class="field-label">${t('conjugation')}</label>
            <div class="conj-grid">
              <input class="input" id="f-c-ich" placeholder="ich">
              <input class="input" id="f-c-du" placeholder="du">
              <input class="input" id="f-c-er" placeholder="er/sie/es">
              <input class="input" id="f-c-wir" placeholder="wir">
              <input class="input" id="f-c-ihr" placeholder="ihr">
              <input class="input" id="f-c-sie" placeholder="sie/Sie">
            </div>
            <div class="field-row">
              <div class="field"><label class="field-label">${t('perfekt')}</label><input class="input" id="f-perfekt" placeholder="hat gespielt"></div>
              <div class="field"><label class="field-label">${t('praeteritum')}</label><input class="input" id="f-praet" placeholder="spielte"></div>
            </div>
            <div class="field-row">
              <div class="field"><label class="field-label">${t('hilfsverb')}</label>
                <select class="select" id="f-hilf"><option>haben</option><option>sein</option></select>
              </div>
              <div class="field"><label class="field-label">${t('objcase_label')}</label>
                <select class="select" id="f-obj"><option value="">${t('none_label')}</option><option value="Akk">Akk</option><option value="Dat">Dat</option></select>
              </div>
            </div>
            <div class="checkbox-row">
              <label><input type="checkbox" id="f-refl">${t('reflexive_lbl')}</label>
              <label><input type="checkbox" id="f-sep">${t('separable_lbl')}</label>
              <label><input type="checkbox" id="f-strong">${t('strong_lbl')}</label>
            </div>
            <div class="field"><label class="field-label">${t('prep_textarea')}</label>
              <textarea class="textarea" id="f-prep" placeholder="auf|Akk|for&#10;über|Akk|about"></textarea>
            </div>
            <div class="field"><label class="field-label">${t('example_de')}</label><input class="input" id="f-ex-de"></div>
            <div class="field"><label class="field-label">${t('example_en')}</label><input class="input" id="f-ex-en"></div>
            <button class="save-btn" id="f-save">${t('save')}</button>
          </div>`;
      } else if (tab === 'bulk') {
        const schemaShown = !!state.bulkSchemaShown;
        const exampleSchema = `[
  {
    "type": "noun",
    "article": "der",
    "word": "Schlüssel",
    "plural": "Schlüssel",
    "en": ["key"],
    "example": { "de": "Wo ist mein Schlüssel?", "en": "Where is my key?" },
    "level": "A1"
  },
  {
    "type": "verb",
    "infinitive": "zeigen",
    "en": ["to show"],
    "conj": {
      "ich": "zeige", "du": "zeigst", "er": "zeigt",
      "wir": "zeigen", "ihr": "zeigt", "sie": "zeigen"
    },
    "perfekt": "hat gezeigt",
    "praeteritum": "zeigte",
    "hilfsverb": "haben",
    "reflexive": false,
    "separable": false,
    "strong": false,
    "objectCase": null,
    "prepositions": [],
    "example": { "de": "Ich zeige dir die Stadt.", "en": "I'll show you the city." },
    "level": "A2"
  }
]`;
        formHtml = `
          <div class="form-stack">
            <div class="bulk-help">${t('bulk_help')}</div>
            <button type="button" class="schema-toggle-btn" id="schema-toggle">
              ${schemaShown ? t('bulk_hide_schema') : t('bulk_show_schema')}
            </button>
            ${schemaShown ? `<div class="schema-block">${escHtml(exampleSchema)}</div>` : ''}
            <div class="field">
              <label class="field-label">${t('bulk_paste_label')}</label>
              <textarea class="bulk-textarea" id="f-bulk" placeholder="[\n  { ... },\n  { ... }\n]" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
            </div>
            <div id="bulk-feedback"></div>
            <button class="save-btn" id="bulk-save">${t('bulk_validate')}</button>
          </div>`;
      }

      view.innerHTML = `
        <div class="subhead">
          <button class="back-btn" id="add-back">←</button>
          <div class="subhead-title">${t('add_word')}</div>
        </div>
        ${tabBar}
        ${formHtml}
      `;

      document.getElementById('add-back').onclick = goHome;
      view.querySelectorAll('.add-tab').forEach(b => {
        b.onclick = () => { state.addTab = b.dataset.tab; renderAdd(); };
      });

      const autofill = document.getElementById('f-autofill');
      if (autofill) autofill.onclick = () => {
        const raw = document.getElementById('f-inf').value.trim();
        if (!raw) return;
        const isReflexive = raw.startsWith('sich ');
        const verb = isReflexive ? raw.slice(5) : raw;
        const stem = verb.endsWith('en') ? verb.slice(0, -2) : (verb.endsWith('n') ? verb.slice(0, -1) : verb);
        const endsTD = /[td]$/.test(stem);
        const conj = {
          ich: stem + 'e',
          du: stem + (endsTD ? 'est' : 'st'),
          er: stem + (endsTD ? 'et' : 't'),
          wir: stem + 'en',
          ihr: stem + (endsTD ? 'et' : 't'),
          sie: stem + 'en',
        };
        const reflPron = { ich: 'mich', du: 'dich', er: 'sich', wir: 'uns', ihr: 'euch', sie: 'sich' };
        Object.keys(conj).forEach(p => {
          document.getElementById('f-c-' + p).value = isReflexive ? `${conj[p]} ${reflPron[p]}` : conj[p];
        });
        document.getElementById('f-perfekt').value = (isReflexive ? 'hat sich ge' : 'hat ge') + stem + (endsTD ? 'et' : 't');
        document.getElementById('f-praet').value = stem + (endsTD ? 'ete' : 'te') + (isReflexive ? ' sich' : '');
        if (isReflexive) document.getElementById('f-refl').checked = true;
      };

      document.getElementById('f-save')?.addEventListener('click', () => {
        const id = 'u' + Date.now();
        const niveau = document.getElementById('f-niveau').value;
        const enRaw = document.getElementById('f-en').value.trim();
        const enList = enRaw ? enRaw.split(',').map(s => s.trim()).slice(0, 3).filter(Boolean) : [];

        let card;
        if (tab === 'noun') {
          const word = document.getElementById('f-noun').value.trim();
          if (!word) { showToast('Nomen?'); return; }
          card = {
            id, type: 'noun',
            article: document.getElementById('f-article').value,
            word,
            plural: document.getElementById('f-plural').value.trim() || '—',
            en: enList,
            example: {
              de: document.getElementById('f-ex-de').value.trim(),
              en: document.getElementById('f-ex-en').value.trim(),
            },
            level: niveau,
          };
        } else {
          const inf = document.getElementById('f-inf').value.trim();
          if (!inf) { showToast('Verb?'); return; }
          const prepLines = document.getElementById('f-prep').value.split('\n').map(l => l.trim()).filter(Boolean);
          const prepositions = prepLines.map(line => {
            const [prep, c, meaning] = line.split('|').map(s => (s || '').trim());
            return { prep, case: c, meaning: meaning || '' };
          }).filter(p => p.prep && (p.case === 'Akk' || p.case === 'Dat'));
          card = {
            id, type: 'verb', infinitive: inf, en: enList,
            conj: {
              ich: document.getElementById('f-c-ich').value.trim(),
              du: document.getElementById('f-c-du').value.trim(),
              er: document.getElementById('f-c-er').value.trim(),
              wir: document.getElementById('f-c-wir').value.trim(),
              ihr: document.getElementById('f-c-ihr').value.trim(),
              sie: document.getElementById('f-c-sie').value.trim(),
            },
            perfekt: document.getElementById('f-perfekt').value.trim(),
            praeteritum: document.getElementById('f-praet').value.trim(),
            hilfsverb: document.getElementById('f-hilf').value,
            reflexive: document.getElementById('f-refl').checked,
            separable: document.getElementById('f-sep').checked,
            strong: document.getElementById('f-strong').checked,
            objectCase: document.getElementById('f-obj').value || null,
            prepositions,
            example: {
              de: document.getElementById('f-ex-de').value.trim(),
              en: document.getElementById('f-ex-en').value.trim(),
            },
            level: niveau,
          };
        }
        state.userCards.push(card);
        save(KEY_CARDS, state.userCards);
        showToast(t('saved'));
        goHome();
      });

      // Bulk import handlers (only present when tab === 'bulk')
      document.getElementById('schema-toggle')?.addEventListener('click', () => {
        state.bulkSchemaShown = !state.bulkSchemaShown;
        renderAdd();
      });
      document.getElementById('bulk-save')?.addEventListener('click', () => {
        const raw = document.getElementById('f-bulk').value.trim();
        const fb = document.getElementById('bulk-feedback');
        if (!raw) {
          fb.innerHTML = `<div class="bulk-feedback error">Leer.</div>`;
          return;
        }
        const result = validateBulkCards(raw);
        if (!result.ok) {
          fb.innerHTML = `<div class="bulk-feedback error">${escHtml(result.error)}</div>`;
          return;
        }
        if (result.cards.length === 0) {
          fb.innerHTML = `<div class="bulk-feedback warn">Keine Karten zum Importieren.</div>`;
          return;
        }
        // Commit the import
        state.userCards.push(...result.cards);
        save(KEY_CARDS, state.userCards);
        const warnHtml = result.warnings.length
          ? `<div style="margin-top:6px;font-size:12px;"><strong>${t('bulk_warnings')}:</strong><ul>${result.warnings.map(w => `<li>${escHtml(w)}</li>`).join('')}</ul></div>`
          : '';
        fb.innerHTML = `<div class="bulk-feedback success">${result.cards.length} ${t('bulk_imported_n')}.${warnHtml}</div>`;
        // Clear the textarea so user knows it landed
        document.getElementById('f-bulk').value = '';
        showToast(`${result.cards.length} ${t('added_n_cards')}`);
      });
    }

    /* ===========================================================================
     * NAVIGATION
     * ===========================================================================*/
    function goHome() {
      renderHome();
      showView('home');
    }

    /* ===========================================================================
     * HEADER + LANG TOGGLE
     * ===========================================================================*/
    function renderLangToggle() {
      const wrap = document.getElementById('lang-toggle');
      wrap.querySelectorAll('.lang-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.lang === state.lang);
        p.onclick = () => {
          state.lang = p.dataset.lang;
          save(KEY_LANG, state.lang);
          document.documentElement.lang = state.lang;
          renderLangToggle();
          // Re-render whatever view is active
          rerenderCurrent();
        };
      });
    }

    function rerenderCurrent() {
      const v = state.currentView;
      // Footer label
      document.getElementById('footer-add-label').textContent = t('add_word');
      if (v === 'home') renderHome();
      else if (v === 'practice') renderPractice();
      else if (v === 'artikel') renderArtikel();
      else if (v === 'verbdeck') renderVerbDeck();
      else if (v === 'browse') renderBrowse();
      else if (v === 'add') renderAdd();
    }

    /* ===========================================================================
     * INIT
     * ===========================================================================*/
    function init() {
      document.documentElement.lang = state.lang;
      renderLangToggle();
      document.getElementById('footer-add-label').textContent = t('add_word');
      document.getElementById('footer-add-btn').onclick = () => { renderAdd(); showView('add'); };
      document.getElementById('brand-link').onclick = goHome;
      // Sticky header shadow when scrolled
      const header = document.getElementById('header');
      document.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 4);
      }, { passive: true });
      ensureTodayFresh();
      renderHome();
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(() => {});
        });
      }
    }

    init();
  })();
  </script>
</body>
</html>
